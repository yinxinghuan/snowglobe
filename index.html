<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0a0e1a" />
<title>Snowglobe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  body {
    border-radius: 24px;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
    font-family: "Cormorant Garamond", "Times New Roman", serif;
    background: #02030a;
    position: relative;
    color: #e8d4b5;
    transition: background 1.2s ease;
  }
  body[data-theme="winter"] { background: radial-gradient(ellipse at 50% 30%, #14182a 0%, #07091a 70%, #02030a 100%); }
  body[data-theme="sakura"] { background: radial-gradient(ellipse at 50% 30%, #2a1224 0%, #160a16 70%, #08040b 100%); }
  body[data-theme="cosmos"] { background: radial-gradient(ellipse at 50% 30%, #14102a 0%, #06041a 70%, #01010a 100%); }

  #stage {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  .switcher {
    position: absolute;
    top: max(18px, env(safe-area-inset-top));
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 4px;
    padding: 4px;
    border-radius: 999px;
    background: rgba(0, 0, 0, 0.30);
    backdrop-filter: blur(14px) saturate(120%);
    -webkit-backdrop-filter: blur(14px) saturate(120%);
    border: 1px solid rgba(255, 255, 255, 0.06);
    box-shadow: 0 1px 8px rgba(0, 0, 0, 0.25);
    z-index: 10;
  }
  .switcher-btn {
    width: 36px;
    height: 36px;
    border: 0;
    background: transparent;
    border-radius: 999px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: rgba(232, 226, 210, 0.45);
    transition: color 0.32s ease, background 0.3s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    padding: 0;
  }
  .switcher-btn:hover { color: rgba(232, 226, 210, 0.9); }
  .switcher-btn.is-active { background: rgba(255, 255, 255, 0.10); }
  .switcher-btn.is-active[data-theme="winter"] { color: #ddeaff; }
  .switcher-btn.is-active[data-theme="sakura"] { color: #ffd0e0; }
  .switcher-btn.is-active[data-theme="cosmos"] { color: #d8c0ff; }
  .switcher-btn svg { display: block; width: 20px; height: 20px; stroke-width: 1.6; fill: none; stroke: currentColor; stroke-linecap: round; stroke-linejoin: round; }

  /* Status row at bottom: time · moon · temperature */
  .status {
    position: absolute;
    bottom: calc(max(20px, env(safe-area-inset-bottom)) + 12px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 11px;
    align-items: center;
    font-family: ui-monospace, "JetBrains Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.22em;
    color: rgba(232, 220, 200, 0.45);
    pointer-events: none;
    z-index: 5;
    white-space: nowrap;
  }
  .status-sep { opacity: 0.5; }
  .status-moon { display: inline-flex; align-items: center; gap: 5px; }
  .status-moon-glyph { font-size: 13px; line-height: 1; opacity: 0.85; }

  /* Cycling poetic fragment, just above the status row */
  .poem {
    position: absolute;
    bottom: calc(max(20px, env(safe-area-inset-bottom)) + 38px);
    left: 50%;
    transform: translateX(-50%);
    font-family: "Cormorant Garamond", "Times New Roman", serif;
    font-style: italic;
    font-size: 15px;
    letter-spacing: 0.02em;
    color: rgba(232, 218, 188, 0.66);
    text-align: center;
    max-width: 86vw;
    pointer-events: none;
    z-index: 5;
    opacity: 0;
    transition: opacity 1.6s ease;
    line-height: 1.2;
  }
  .poem.is-visible { opacity: 1; }

  .perm {
    position: absolute;
    bottom: calc(max(20px, env(safe-area-inset-bottom)) + 64px);
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 6px;
    padding: 9px 16px;
    font-family: ui-monospace, "JetBrains Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255, 246, 220, 0.96);
    background: rgba(232, 200, 130, 0.16);
    border: 1px solid rgba(232, 200, 130, 0.45);
    border-radius: 999px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    cursor: pointer;
    z-index: 12;
    -webkit-tap-highlight-color: transparent;
  }
  .perm.is-show { display: flex; }
  .perm:hover { background: rgba(232, 200, 130, 0.26); }

  .debug {
    position: absolute;
    top: 12px;
    left: 12px;
    padding: 8px 10px;
    font-family: ui-monospace, "JetBrains Mono", monospace;
    font-size: 10px;
    line-height: 1.45;
    color: rgba(232, 212, 181, 0.85);
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid rgba(232, 212, 181, 0.18);
    border-radius: 6px;
    z-index: 50;
    display: none;
    pointer-events: none;
    white-space: pre;
  }
  .debug.is-on { display: block; }
</style>
</head>
<body data-theme="winter">
<canvas id="stage"></canvas>
<div class="switcher" id="switcher">
  <button class="switcher-btn is-active" data-theme="winter" aria-label="winter night">
    <svg viewBox="0 0 24 24"><path d="M12 2v20M4.93 4.93l14.14 14.14M2 12h20M4.93 19.07L19.07 4.93M7 5l5 1 5-1M7 19l5-1 5 1"/></svg>
  </button>
  <button class="switcher-btn" data-theme="sakura" aria-label="sakura dusk">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.2"/><ellipse cx="12" cy="6" rx="2.4" ry="3.4"/><ellipse cx="17.2" cy="9.7" rx="2.4" ry="3.4" transform="rotate(72 17.2 9.7)"/><ellipse cx="15.2" cy="16.3" rx="2.4" ry="3.4" transform="rotate(144 15.2 16.3)"/><ellipse cx="8.8" cy="16.3" rx="2.4" ry="3.4" transform="rotate(216 8.8 16.3)"/><ellipse cx="6.8" cy="9.7" rx="2.4" ry="3.4" transform="rotate(288 6.8 9.7)"/></svg>
  </button>
  <button class="switcher-btn" data-theme="cosmos" aria-label="cosmos drift">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.2"/><ellipse cx="12" cy="12" rx="9.5" ry="3" transform="rotate(-22 12 12)"/></svg>
  </button>
</div>
<div class="poem" id="poem"></div>
<div class="status" id="status">
  <span id="statusTime">--:--</span>
  <span class="status-sep">·</span>
  <span class="status-moon"><span class="status-moon-glyph" id="moonGlyph">🌒</span><span id="moonName">CRESCENT</span></span>
  <span class="status-sep">·</span>
  <span id="statusTemp">—</span>
</div>
<button class="perm" id="permBtn">⤲ enable tilt &amp; shake</button>
<div class="debug" id="debug"></div>
<script>
'use strict';

// ─── Setup ────────────────────────────────────────────────────────────────
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const debugEl = document.getElementById('debug');
const permBtn = document.getElementById('permBtn');
const switcherEl = document.getElementById('switcher');
const poemEl = document.getElementById('poem');
const statusTimeEl = document.getElementById('statusTime');
const statusTempEl = document.getElementById('statusTemp');
const moonGlyphEl = document.getElementById('moonGlyph');
const moonNameEl = document.getElementById('moonName');
const params = new URLSearchParams(location.search);
const DEBUG = params.get('debug') === '1';
if (DEBUG) debugEl.classList.add('is-on');

let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(DPR, DPR);
}
resize();
window.addEventListener('resize', resize);

// ─── Themes ───────────────────────────────────────────────────────────────
// Each theme defines colors, particle shape, scene content and audio. Drawing
// functions branch on theme.id where the difference is structural (e.g. tree
// vs no tree); everywhere else they read colors off `theme`.
const THEMES = {
  winter: {
    id: 'winter',
    accent: '#ddeaff',
    particle: { type: 'snow', color: 'rgba(255, 252, 240, 0.95)', glow: 'rgba(255, 250, 235, 0.45)' },
    skyInner: ['#1f2438', '#161a2c', '#0a0d1a'],
    moon: { x: 0.42, y: -0.55, r: 0.13, disk: ['#fff5e0', '#d8c39a'], halo: 'rgba(245, 232, 200, 0.42)' },
    mountainsFar: '#1c2235',
    mountainsNear: '#11152a',
    hill: '#080b18',
    tree: '#0a0c1c',
    treeSnow: 'rgba(232, 226, 210, 0.55)',
    floor: ['rgba(232, 226, 210, 0.92)', 'rgba(232, 226, 210, 0.4)'],
    pedestal: { topRing: '#1a1109', wood: ['#2a1d12', '#3a281b', '#180f08'], rim: 'rgba(232, 218, 188, 0.42)',
                plaque: ['#7a5c2f', '#a8854a', '#5a4220'], plaqueText: 'SNOWGLOBE',
                plaqueInk: 'rgba(20, 12, 4, 0.92)', plaqueHi: 'rgba(255, 240, 210, 0.18)' },
    audio: { ambientCutoff: 320, bellTones: [880, 988, 1175, 1319, 1480], bellAttack: 0.01, bellDecay: 1.4, bellType: 'sine', bellPeak: 0.07 },
    starsHidden: false,
  },
  sakura: {
    id: 'sakura',
    accent: '#ffd0e0',
    particle: { type: 'petal', color: 'rgba(255, 200, 215, 0.92)', glow: 'rgba(255, 220, 230, 0.0)' },
    skyInner: ['#3a1f3c', '#5a2b48', '#8a3a52'],
    moon: { x: -0.05, y: -0.50, r: 0.18, disk: ['#fff5e0', '#ffc295'], halo: 'rgba(255, 200, 170, 0.55)' },
    mountainsFar: '#5a2c48',
    mountainsNear: '#3a1d34',
    hill: '#251525',
    tree: 'cherry',          // structural variant
    treeTrunk: '#2a1218',
    treeBlossom: '#ffc6d8',
    floor: ['rgba(255, 215, 220, 0.86)', 'rgba(255, 200, 210, 0.42)'],
    pedestal: { topRing: '#1a0a0c', wood: ['#3a1d20', '#4d2a28', '#1c0e10'], rim: 'rgba(232, 188, 188, 0.40)',
                plaque: ['#a45a48', '#d49278', '#7a3838'], plaqueText: 'SAKURA NIGHT',
                plaqueInk: 'rgba(28, 8, 14, 0.92)', plaqueHi: 'rgba(255, 220, 220, 0.20)' },
    audio: { ambientCutoff: 280, bellTones: [659, 740, 880, 988, 1109], bellAttack: 0.005, bellDecay: 2.0, bellType: 'triangle', bellPeak: 0.06 },
    starsHidden: true,
  },
  cosmos: {
    id: 'cosmos',
    accent: '#d8c0ff',
    particle: { type: 'star', color: 'rgba(220, 230, 255, 0.95)', glow: 'rgba(180, 220, 255, 0.7)' },
    skyInner: ['#1c1238', '#180e30', '#080418'],
    moon: { x: 0.42, y: -0.50, r: 0.16, disk: ['#e0c4f0', '#7a5cb0'], halo: 'rgba(170, 130, 220, 0.42)', ring: true },
    mountainsFar: 'rgba(60, 35, 90, 0.42)',
    mountainsNear: 'rgba(35, 18, 55, 0.78)',
    hill: '#0a0618',
    tree: 'spire',           // structural variant — crystal needle
    treeTrunk: '#604080',
    treeBlossom: '#d0a8ff',
    floor: ['rgba(180, 150, 220, 0.65)', 'rgba(120, 90, 180, 0.25)'],
    pedestal: { topRing: '#0a0814', wood: ['#1c1428', '#2a2038', '#0e0814'], rim: 'rgba(216, 192, 255, 0.45)',
                plaque: ['#5840a0', '#9080d0', '#3c2880'], plaqueText: 'COSMOS DRIFT',
                plaqueInk: 'rgba(8, 4, 24, 0.92)', plaqueHi: 'rgba(216, 200, 255, 0.22)' },
    audio: { ambientCutoff: 220, bellTones: [523, 622, 740, 932, 1109], bellAttack: 0.02, bellDecay: 2.6, bellType: 'sine', bellPeak: 0.06 },
    starsHidden: false,
    starColor: 'rgba(216, 192, 255, %a%)',
  },
};
let currentTheme = THEMES.winter;
function setTheme(id) {
  if (!THEMES[id]) return;
  currentTheme = THEMES[id];
  document.body.setAttribute('data-theme', id);
  for (const btn of switcherEl.querySelectorAll('.switcher-btn')) {
    btn.classList.toggle('is-active', btn.dataset.theme === id);
  }
  // Audio retunes on next bell
}
for (const btn of switcherEl.querySelectorAll('.switcher-btn')) {
  btn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    setTheme(btn.dataset.theme);
    // A small swirl on theme change so the new look catches the eye
    shake(0.4);
  });
}

// ─── Globe geometry — derived from viewport, recomputed each frame ────────
function globeGeom() {
  const cx = W / 2;
  const usable = Math.min(W * 0.92, H * 0.72);
  const r = usable / 2;
  const cy = H * 0.42;
  return { cx, cy, r };
}

// ─── Particles ────────────────────────────────────────────────────────────
const N = 240;
const sx = new Float32Array(N);
const sy = new Float32Array(N);
const svx = new Float32Array(N);
const svy = new Float32Array(N);
const sr = new Float32Array(N);
const sa = new Float32Array(N);
const sphase = new Float32Array(N);
const srot = new Float32Array(N);                 // petal rotation, also used as star twinkle phase

function seedFlakes() {
  const g = globeGeom();
  for (let i = 0; i < N; i++) {
    const ang = Math.random() * Math.PI * 2;
    const rad = Math.sqrt(Math.random()) * g.r * 0.95;
    sx[i] = g.cx + Math.cos(ang) * rad;
    sy[i] = g.cy + Math.sin(ang) * rad;
    svx[i] = (Math.random() - 0.5) * 0.3;
    svy[i] = 0.2 + Math.random() * 0.8;
    sr[i] = Math.random() < 0.18
      ? 1.6 + Math.random() * 1.4
      : 0.5 + Math.random() * 1.0;
    sa[i] = 0.55 + Math.random() * 0.4;
    sphase[i] = Math.random() * Math.PI * 2;
    srot[i] = Math.random() * Math.PI * 2;
  }
}
seedFlakes();

// ─── Wind & energy ────────────────────────────────────────────────────────
const wind = { x: 0, y: 0 };
const wTarget = { x: 0, y: 0 };
let energy = 0;
let lastShakeT = 0;

function shake(strength = 1) {
  energy = Math.min(1, energy + strength * 0.85);
  const angBase = Math.random() * Math.PI * 2;
  for (let i = 0; i < N; i++) {
    const a = angBase + (Math.random() - 0.5) * 1.6;
    const v = (4 + Math.random() * 8) * strength;
    svx[i] += Math.cos(a) * v;
    svy[i] += Math.sin(a) * v - (3 + Math.random() * 3) * strength;
  }
  lastShakeT = performance.now();
  pingShake();
}

// ─── Simulation ──────────────────────────────────────────────────────────
function step() {
  const g = globeGeom();
  wind.x += (wTarget.x - wind.x) * 0.07;
  wind.y += (wTarget.y - wind.y) * 0.07;
  energy *= 0.985;

  for (let i = 0; i < N; i++) {
    sphase[i] += 0.012 + sr[i] * 0.0015;
    const driftX = Math.sin(sphase[i]) * 0.35;

    svx[i] += wind.x * 0.02 + driftX * 0.04;
    svy[i] += 0.02 + wind.y * 0.02;
    if (energy > 0.05) {
      svx[i] += (Math.random() - 0.5) * energy * 0.6;
      svy[i] += (Math.random() - 0.5) * energy * 0.6;
    }

    const drag = 0.962 + sr[i] * 0.005;
    svx[i] *= drag;
    svy[i] *= drag;

    const vmax = 14;
    if (svx[i] > vmax) svx[i] = vmax;
    if (svx[i] < -vmax) svx[i] = -vmax;
    if (svy[i] > vmax) svy[i] = vmax;
    if (svy[i] < -vmax) svy[i] = -vmax;

    sx[i] += svx[i];
    sy[i] += svy[i];

    // For petals, accumulate rotation from horizontal velocity
    if (currentTheme.particle.type === 'petal') {
      srot[i] += svx[i] * 0.012 + 0.004;
    }

    const dx = sx[i] - g.cx;
    const dy = sy[i] - g.cy;
    const distSq = dx * dx + dy * dy;
    const inner = g.r - 4;
    if (distSq > inner * inner) {
      const dist = Math.sqrt(distSq);
      const nx = dx / dist;
      const ny = dy / dist;
      sx[i] = g.cx + nx * inner;
      sy[i] = g.cy + ny * inner;
      const vn = svx[i] * nx + svy[i] * ny;
      svx[i] -= (1 + 0.45) * vn * nx;
      svy[i] -= (1 + 0.45) * vn * ny;
      svx[i] *= 0.7;
      svy[i] *= 0.7;
    }
  }
}

// ─── Render ──────────────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);
  const g = globeGeom();
  const t = currentTheme;

  if (!t.starsHidden) drawStars();

  // Globe shadow on pedestal
  ctx.beginPath();
  ctx.ellipse(g.cx, g.cy + g.r * 0.94, g.r * 0.84, g.r * 0.18, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
  ctx.fill();

  drawPedestal(g, t);

  // Glass interior
  const gradInner = ctx.createRadialGradient(g.cx, g.cy - g.r * 0.2, g.r * 0.1, g.cx, g.cy, g.r);
  gradInner.addColorStop(0,    t.skyInner[0]);
  gradInner.addColorStop(0.55, t.skyInner[1]);
  gradInner.addColorStop(1,    t.skyInner[2]);
  ctx.beginPath();
  ctx.arc(g.cx, g.cy, g.r, 0, Math.PI * 2);
  ctx.fillStyle = gradInner;
  ctx.fill();

  ctx.save();
  ctx.beginPath();
  ctx.arc(g.cx, g.cy, g.r - 2, 0, Math.PI * 2);
  ctx.clip();

  if (t.id === 'cosmos') drawNebula(g, t);
  drawMoon(g, t);
  drawMountains(g, g.cy + g.r * 0.10, t.mountainsFar, 0.62);
  drawMountains(g, g.cy + g.r * 0.30, t.mountainsNear, 0.85);
  drawHill(g, t);
  drawFloor(g, t);
  drawFlakes(t);

  // Sphere shading INSIDE the clip — sells volume by darkening the lower-right
  // (the side away from the implied upper-left light source) and washing a
  // soft warm light through the glass on the upper-left.
  drawSphereShading(g);

  ctx.restore();

  drawGlass(g, t);
  drawGlassSpec(g);

  if (DEBUG) drawDebug();
}

// ─── Background stars (outside globe, fixed positions per session) ────────
const STARS = Array.from({ length: 50 }, () => ({
  x: Math.random(), y: Math.random() * 0.45,
  r: 0.2 + Math.random() * 0.8,
  twinkle: Math.random() * Math.PI * 2,
}));
function drawStars() {
  for (const s of STARS) {
    const x = s.x * W;
    const y = s.y * H;
    const a = 0.25 + 0.35 * Math.sin(performance.now() * 0.0008 + s.twinkle);
    ctx.fillStyle = `rgba(232, 220, 200, ${a})`;
    ctx.beginPath();
    ctx.arc(x, y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ─── Cosmos: faint nebula gradient inside globe ───────────────────────────
function drawNebula(g, t) {
  const cx = g.cx + g.r * 0.2;
  const cy = g.cy - g.r * 0.1;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, g.r * 0.9);
  grad.addColorStop(0,   'rgba(140, 80, 180, 0.25)');
  grad.addColorStop(0.4, 'rgba(80, 50, 140, 0.12)');
  grad.addColorStop(1,   'rgba(40, 20, 80, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(g.cx, g.cy, g.r, 0, Math.PI * 2);
  ctx.fill();
}

function drawMoon(g, t) {
  const m = t.moon;
  const mx = g.cx + g.r * m.x;
  const my = g.cy + g.r * m.y;
  const mr = g.r * m.r;
  // Halo
  const halo = ctx.createRadialGradient(mx, my, 0, mx, my, mr * 3.5);
  halo.addColorStop(0,   m.halo);
  halo.addColorStop(0.4, m.halo.replace(/,\s*[\d.]+\)$/, ', 0.12)'));
  halo.addColorStop(1,   m.halo.replace(/,\s*[\d.]+\)$/, ', 0)'));
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(mx, my, mr * 3.5, 0, Math.PI * 2);
  ctx.fill();
  // Disk
  const disk = ctx.createRadialGradient(mx - mr * 0.3, my - mr * 0.3, 0, mx, my, mr);
  disk.addColorStop(0, m.disk[0]);
  disk.addColorStop(1, m.disk[1]);
  ctx.fillStyle = disk;
  ctx.beginPath();
  ctx.arc(mx, my, mr, 0, Math.PI * 2);
  ctx.fill();
  // Cosmos: ring
  if (m.ring) {
    ctx.save();
    ctx.translate(mx, my);
    ctx.rotate(-0.36);
    ctx.beginPath();
    ctx.ellipse(0, 0, mr * 1.85, mr * 0.42, 0, 0, Math.PI * 2);
    ctx.lineWidth = 2.4;
    ctx.strokeStyle = 'rgba(232, 210, 255, 0.55)';
    ctx.stroke();
    // Front half — slight darker so it feels like it wraps
    ctx.beginPath();
    ctx.ellipse(0, 0, mr * 1.85, mr * 0.42, 0, 0.05 * Math.PI, 0.95 * Math.PI);
    ctx.lineWidth = 1.8;
    ctx.strokeStyle = 'rgba(140, 100, 200, 0.85)';
    ctx.stroke();
    ctx.restore();
  }
}

function drawMountains(g, baseY, color, height) {
  ctx.beginPath();
  ctx.moveTo(g.cx - g.r, baseY);
  const steps = 12;
  const span = g.r * 2;
  const peak = g.r * 0.22 * height;
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const px = g.cx - g.r + t * span;
    const py = baseY - peak * (
      0.55 + 0.45 * Math.abs(Math.sin(t * 7.3 + baseY * 0.013) + 0.4 * Math.sin(t * 19 + baseY * 0.07))
    );
    ctx.lineTo(px, py);
  }
  ctx.lineTo(g.cx + g.r, baseY);
  ctx.lineTo(g.cx + g.r, g.cy + g.r);
  ctx.lineTo(g.cx - g.r, g.cy + g.r);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function drawHill(g, t) {
  const baseY = g.cy + g.r * 0.50;
  ctx.beginPath();
  ctx.moveTo(g.cx - g.r, baseY);
  for (let s = 0; s <= 1; s += 0.04) {
    const x = g.cx - g.r + s * g.r * 2;
    const lift = g.r * 0.18 * (1 - Math.pow(2 * (s - 0.5), 2));
    ctx.lineTo(x, baseY - lift);
  }
  ctx.lineTo(g.cx + g.r, g.cy + g.r);
  ctx.lineTo(g.cx - g.r, g.cy + g.r);
  ctx.closePath();
  ctx.fillStyle = t.hill;
  ctx.fill();

  const tx = g.cx + g.r * 0.05;
  const ty = baseY - g.r * 0.15;
  if (t.tree === 'cherry') drawCherry(tx, ty, g.r * 0.20, t);
  else if (t.tree === 'spire') drawSpire(tx, ty, g.r * 0.20, t);
  else drawFir(tx, ty, g.r * 0.18, t.tree, t.treeSnow);
}

function drawFir(x, y, h, color, snow) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - h);
  ctx.lineTo(x + h * 0.32, y - h * 0.55);
  ctx.lineTo(x + h * 0.18, y - h * 0.55);
  ctx.lineTo(x + h * 0.42, y - h * 0.18);
  ctx.lineTo(x + h * 0.24, y - h * 0.18);
  ctx.lineTo(x + h * 0.5,  y);
  ctx.lineTo(x - h * 0.5,  y);
  ctx.lineTo(x - h * 0.24, y - h * 0.18);
  ctx.lineTo(x - h * 0.42, y - h * 0.18);
  ctx.lineTo(x - h * 0.18, y - h * 0.55);
  ctx.lineTo(x - h * 0.32, y - h * 0.55);
  ctx.closePath();
  ctx.fill();
  if (snow) {
    ctx.fillStyle = snow;
    ctx.beginPath();
    ctx.moveTo(x, y - h);
    ctx.lineTo(x + h * 0.07, y - h * 0.85);
    ctx.lineTo(x - h * 0.07, y - h * 0.85);
    ctx.closePath();
    ctx.fill();
  }
}

// Cherry tree — slightly curved trunk with a cluster of soft blossom puffs
function drawCherry(x, y, h, t) {
  ctx.save();
  // Trunk
  ctx.strokeStyle = t.treeTrunk;
  ctx.lineWidth = h * 0.08;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.bezierCurveTo(x - h * 0.05, y - h * 0.4, x + h * 0.08, y - h * 0.6, x, y - h * 0.85);
  ctx.stroke();
  // Branches
  ctx.lineWidth = h * 0.04;
  const branches = [
    [-0.55, -0.55], [0.55, -0.45], [-0.4, -0.85], [0.45, -0.9], [0, -0.95],
  ];
  for (const [dx, dy] of branches) {
    ctx.beginPath();
    ctx.moveTo(x, y - h * 0.5);
    ctx.lineTo(x + dx * h, y + dy * h);
    ctx.stroke();
  }
  // Blossom puffs — soft pink clusters
  const puffs = [
    [-0.55, -0.55, 0.18], [0.55, -0.45, 0.18], [-0.4, -0.85, 0.20], [0.45, -0.9, 0.20],
    [0, -0.95, 0.22], [-0.15, -0.7, 0.16], [0.2, -0.7, 0.16],
  ];
  for (const [dx, dy, rs] of puffs) {
    const px = x + dx * h;
    const py = y + dy * h;
    const pr = h * rs;
    const grad = ctx.createRadialGradient(px - pr * 0.3, py - pr * 0.3, 0, px, py, pr);
    grad.addColorStop(0, 'rgba(255, 230, 240, 0.92)');
    grad.addColorStop(0.7, t.treeBlossom);
    grad.addColorStop(1, 'rgba(180, 80, 130, 0.4)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// Crystal spire — a slender prism for the cosmos scene
function drawSpire(x, y, h, t) {
  ctx.save();
  // Body — diamond-stretched
  ctx.beginPath();
  ctx.moveTo(x, y - h * 1.05);
  ctx.lineTo(x + h * 0.13, y - h * 0.25);
  ctx.lineTo(x + h * 0.04, y);
  ctx.lineTo(x - h * 0.04, y);
  ctx.lineTo(x - h * 0.13, y - h * 0.25);
  ctx.closePath();
  const grad = ctx.createLinearGradient(x - h * 0.13, y, x + h * 0.13, y - h);
  grad.addColorStop(0, 'rgba(60, 40, 100, 0.85)');
  grad.addColorStop(0.5, t.treeBlossom);
  grad.addColorStop(1, 'rgba(255, 230, 250, 0.9)');
  ctx.fillStyle = grad;
  ctx.fill();
  // Inner facet line
  ctx.strokeStyle = 'rgba(255, 240, 255, 0.55)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(x, y - h * 1.05);
  ctx.lineTo(x, y);
  ctx.stroke();
  // Glow halo at tip
  const haloGrad = ctx.createRadialGradient(x, y - h * 1.0, 0, x, y - h * 1.0, h * 0.35);
  haloGrad.addColorStop(0, 'rgba(216, 192, 255, 0.45)');
  haloGrad.addColorStop(1, 'rgba(216, 192, 255, 0)');
  ctx.fillStyle = haloGrad;
  ctx.beginPath();
  ctx.arc(x, y - h * 1.0, h * 0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawFloor(g, t) {
  const baseY = g.cy + g.r * 0.62;
  ctx.beginPath();
  ctx.ellipse(g.cx, baseY + g.r * 0.05, g.r * 1.05, g.r * 0.22, 0, 0, Math.PI * 2);
  const grad = ctx.createLinearGradient(0, baseY - g.r * 0.05, 0, baseY + g.r * 0.18);
  grad.addColorStop(0, t.floor[0]);
  grad.addColorStop(1, t.floor[1]);
  ctx.fillStyle = grad;
  ctx.fill();
}

function drawFlakes(t) {
  if (t.particle.type === 'petal') {
    drawPetals(t);
  } else if (t.particle.type === 'star') {
    drawStardust(t);
  } else {
    drawSnow(t);
  }
}

function drawSnow(t) {
  ctx.shadowColor = t.particle.glow;
  ctx.shadowBlur = 4;
  ctx.fillStyle = t.particle.color;
  for (let i = 0; i < N; i++) {
    const r = sr[i];
    if (r > 1.3) continue;
    ctx.globalAlpha = sa[i];
    ctx.beginPath();
    ctx.arc(sx[i], sy[i], r, 0, Math.PI * 2);
    ctx.fill();
  }
  for (let i = 0; i < N; i++) {
    const r = sr[i];
    if (r <= 1.3) continue;
    ctx.globalAlpha = sa[i];
    ctx.beginPath();
    ctx.arc(sx[i], sy[i], r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawPetals(t) {
  ctx.fillStyle = t.particle.color;
  for (let i = 0; i < N; i++) {
    const r = sr[i] * 1.6;
    ctx.save();
    ctx.translate(sx[i], sy[i]);
    ctx.rotate(srot[i]);
    // Tilt the petal so it looks like it's falling face-up sometimes face-edge
    const wobble = 0.55 + 0.45 * Math.sin(sphase[i] * 1.7);
    ctx.globalAlpha = sa[i] * (0.75 + 0.25 * wobble);
    ctx.beginPath();
    ctx.ellipse(0, 0, r, r * 0.55 * wobble + r * 0.15, 0, 0, Math.PI * 2);
    ctx.fill();
    // Tiny dark vein for shape definition
    if (r > 1.6) {
      ctx.strokeStyle = 'rgba(180, 80, 130, 0.35)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(-r * 0.7, 0);
      ctx.lineTo(r * 0.7, 0);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function drawStardust(t) {
  ctx.shadowColor = t.particle.glow;
  ctx.shadowBlur = 6;
  for (let i = 0; i < N; i++) {
    const r = sr[i];
    const tw = 0.6 + 0.4 * Math.sin(performance.now() * 0.003 + srot[i]);
    ctx.globalAlpha = sa[i] * tw;
    // Stars get a gentle hue tint
    const hue = 220 + 30 * Math.sin(srot[i]);
    ctx.fillStyle = `hsla(${hue}, 50%, 90%, 0.95)`;
    ctx.beginPath();
    ctx.arc(sx[i], sy[i], r * 1.2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawGlass(g, t) {
  ctx.beginPath();
  ctx.arc(g.cx, g.cy, g.r + 1, 0, Math.PI * 2);
  ctx.lineWidth = 2.2;
  ctx.strokeStyle = 'rgba(232, 218, 188, 0.75)';
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(g.cx, g.cy, g.r - 1, 0, Math.PI * 2);
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.55)';
  ctx.stroke();

  ctx.save();
  ctx.beginPath();
  ctx.arc(g.cx, g.cy, g.r - 1, Math.PI * 1.02, Math.PI * 1.62);
  ctx.lineWidth = 3.8;
  ctx.strokeStyle = 'rgba(255, 250, 230, 0.48)';
  ctx.stroke();
  ctx.restore();

  ctx.save();
  ctx.beginPath();
  ctx.arc(g.cx, g.cy, g.r - 6, Math.PI * 0.05, Math.PI * 0.30);
  ctx.lineWidth = 2.2;
  ctx.strokeStyle = 'rgba(255, 250, 230, 0.18)';
  ctx.stroke();
  ctx.restore();

  // (Specular spots are now drawn separately in drawGlassSpec, after rims)
}

// Sphere depth shading — pulled inside the clip so it darkens the scene
// itself, not just the glass surface. Selling the dome's curvature: the
// implied light is upper-left, so the lower-right gets a soft fall-off.
function drawSphereShading(g) {
  // Subtle outer dark vignette anchored at lower-right
  const sg = ctx.createRadialGradient(
    g.cx + g.r * 0.35, g.cy + g.r * 0.35, g.r * 0.45,
    g.cx + g.r * 0.35, g.cy + g.r * 0.35, g.r * 1.45
  );
  sg.addColorStop(0,   'rgba(0, 0, 0, 0)');
  sg.addColorStop(0.65, 'rgba(0, 0, 0, 0.18)');
  sg.addColorStop(1,    'rgba(0, 0, 0, 0.42)');
  ctx.fillStyle = sg;
  ctx.fillRect(g.cx - g.r, g.cy - g.r, g.r * 2, g.r * 2);

  // Soft warm wash from the upper-left — like ambient room light through glass
  const lw = ctx.createRadialGradient(
    g.cx - g.r * 0.40, g.cy - g.r * 0.45, 0,
    g.cx - g.r * 0.40, g.cy - g.r * 0.45, g.r * 0.95
  );
  lw.addColorStop(0,   'rgba(255, 248, 230, 0.20)');
  lw.addColorStop(0.45, 'rgba(255, 248, 230, 0.08)');
  lw.addColorStop(1,    'rgba(255, 248, 230, 0)');
  ctx.fillStyle = lw;
  ctx.fillRect(g.cx - g.r, g.cy - g.r, g.r * 2, g.r * 2);
}

// Sharp specular reflections — drawn AFTER the rims so they sit on the very
// top. A real glass orb under directional light has one tight bright kernel
// plus one or two smaller reflected sparkles.
function drawGlassSpec(g) {
  // Primary streak ~ 10 o'clock — elongated highlight
  const sx1 = g.cx - g.r * 0.50;
  const sy1 = g.cy - g.r * 0.55;
  ctx.save();
  ctx.translate(sx1, sy1);
  ctx.rotate(-0.55);
  const spec = ctx.createRadialGradient(0, 0, 0, 0, 0, g.r * 0.20);
  spec.addColorStop(0,    'rgba(255, 255, 255, 0.96)');
  spec.addColorStop(0.35, 'rgba(255, 255, 255, 0.55)');
  spec.addColorStop(0.75, 'rgba(255, 255, 255, 0.12)');
  spec.addColorStop(1,    'rgba(255, 255, 255, 0)');
  ctx.fillStyle = spec;
  ctx.beginPath();
  ctx.ellipse(0, 0, g.r * 0.07, g.r * 0.20, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Secondary sparkle near 1 o'clock — smaller, dimmer
  const sx2 = g.cx + g.r * 0.50;
  const sy2 = g.cy - g.r * 0.42;
  ctx.save();
  ctx.translate(sx2, sy2);
  ctx.rotate(0.4);
  const sp2 = ctx.createRadialGradient(0, 0, 0, 0, 0, g.r * 0.10);
  sp2.addColorStop(0,   'rgba(255, 255, 255, 0.55)');
  sp2.addColorStop(0.6, 'rgba(255, 255, 255, 0.15)');
  sp2.addColorStop(1,   'rgba(255, 255, 255, 0)');
  ctx.fillStyle = sp2;
  ctx.beginPath();
  ctx.ellipse(0, 0, g.r * 0.035, g.r * 0.10, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawPedestal(g, t) {
  const top = g.cy + g.r * 0.92;
  const base = Math.min(top + g.r * 0.32, H - 24);
  const halfTop = g.r * 0.78;
  const halfBase = g.r * 0.92;
  const p = t.pedestal;

  ctx.beginPath();
  ctx.moveTo(g.cx - halfTop, top);
  ctx.lineTo(g.cx + halfTop, top);
  ctx.lineTo(g.cx + halfBase, base);
  ctx.lineTo(g.cx - halfBase, base);
  ctx.closePath();
  const woodGrad = ctx.createLinearGradient(0, top, 0, base);
  woodGrad.addColorStop(0,    p.wood[0]);
  woodGrad.addColorStop(0.45, p.wood[1]);
  woodGrad.addColorStop(1,    p.wood[2]);
  ctx.fillStyle = woodGrad;
  ctx.fill();

  ctx.beginPath();
  ctx.ellipse(g.cx, top, halfTop, halfTop * 0.16, 0, 0, Math.PI * 2);
  ctx.fillStyle = p.topRing;
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(g.cx, top - 1, halfTop, halfTop * 0.13, 0, 0, Math.PI * 2);
  ctx.strokeStyle = p.rim;
  ctx.lineWidth = 1;
  ctx.stroke();

  const plaqueW = halfTop * 1.15;
  const plaqueH = (base - top) * 0.5;
  const plaqueY = top + (base - top) * 0.28;
  const plaqueGrad = ctx.createLinearGradient(0, plaqueY, 0, plaqueY + plaqueH);
  plaqueGrad.addColorStop(0,   p.plaque[0]);
  plaqueGrad.addColorStop(0.5, p.plaque[1]);
  plaqueGrad.addColorStop(1,   p.plaque[2]);
  ctx.fillStyle = plaqueGrad;
  ctx.beginPath();
  roundRect(ctx, g.cx - plaqueW / 2, plaqueY, plaqueW, plaqueH, 3);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0, 0, 0, 0.55)';
  ctx.lineWidth = 0.6;
  ctx.stroke();

  ctx.save();
  ctx.font = `${Math.max(11, plaqueH * 0.42)}px "Cormorant Garamond", "Times New Roman", serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = p.plaqueHi;
  ctx.fillText(p.plaqueText, g.cx, plaqueY + plaqueH * 0.5 + 0.6);
  ctx.fillStyle = p.plaqueInk;
  ctx.fillText(p.plaqueText, g.cx, plaqueY + plaqueH * 0.5);
  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ─── Audio ───────────────────────────────────────────────────────────────
let audioCtx = null;
let ambientGain = null;
let ambientFilter = null;
let ambientNode = null;
function ensureAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  const Ctor = window.AudioContext || window.webkitAudioContext;
  if (!Ctor) return;
  audioCtx = new Ctor();
  startAmbient();
}
function startAmbient() {
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 4, audioCtx.sampleRate);
  const ch = buf.getChannelData(0);
  let last = 0;
  for (let i = 0; i < ch.length; i++) {
    const w = (Math.random() * 2 - 1) * 0.5;
    last = (last + 0.04 * w) / 1.04;
    ch[i] = last * 3;
  }
  ambientNode = audioCtx.createBufferSource();
  ambientNode.buffer = buf;
  ambientNode.loop = true;
  ambientFilter = audioCtx.createBiquadFilter();
  ambientFilter.type = 'lowpass';
  ambientFilter.frequency.value = currentTheme.audio.ambientCutoff;
  ambientFilter.Q.value = 0.4;
  ambientGain = audioCtx.createGain();
  ambientGain.gain.value = 0;
  ambientNode.connect(ambientFilter).connect(ambientGain).connect(audioCtx.destination);
  ambientNode.start();
  scheduleAmbientBreathe();
}
function scheduleAmbientBreathe() {
  if (!audioCtx) return;
  // Retune the ambient filter to match the active theme each breath
  if (ambientFilter) ambientFilter.frequency.linearRampToValueAtTime(
    currentTheme.audio.ambientCutoff,
    audioCtx.currentTime + 1.5
  );
  const now = audioCtx.currentTime;
  const rand = (a, b) => a + Math.random() * (b - a);
  const rise   = rand(5, 8);
  const hold   = rand(8, 16);
  const fall   = rand(6, 10);
  const silent = rand(7, 16);
  const peak   = 0.06 + Math.random() * 0.04;
  ambientGain.gain.cancelScheduledValues(now);
  ambientGain.gain.setValueAtTime(ambientGain.gain.value, now);
  ambientGain.gain.linearRampToValueAtTime(peak, now + rise);
  ambientGain.gain.setValueAtTime(peak, now + rise + hold);
  ambientGain.gain.linearRampToValueAtTime(0, now + rise + hold + fall);
  setTimeout(scheduleAmbientBreathe, (rise + hold + fall + silent) * 1000);
}

function pingShake() {
  if (!audioCtx) return;
  const a = currentTheme.audio;
  const now = audioCtx.currentTime;
  // Rustle / wash
  const len = 0.5;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * len, audioCtx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < ch.length; i++) {
    const tt = i / ch.length;
    ch[i] = (Math.random() * 2 - 1) * Math.exp(-tt * 4) * 0.6;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const flt = audioCtx.createBiquadFilter();
  flt.type = 'bandpass';
  flt.frequency.value = 800 + a.ambientCutoff * 1.5;
  flt.Q.value = 1.2;
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.18, now + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.0001, now + len);
  src.connect(flt).connect(gain).connect(audioCtx.destination);
  src.start(now);
  src.stop(now + len + 0.1);

  // Bell
  const f = a.bellTones[Math.floor(Math.random() * a.bellTones.length)];
  const osc = audioCtx.createOscillator();
  const og = audioCtx.createGain();
  osc.type = a.bellType;
  osc.frequency.value = f;
  og.gain.setValueAtTime(0, now);
  og.gain.linearRampToValueAtTime(a.bellPeak, now + a.bellAttack);
  og.gain.exponentialRampToValueAtTime(0.0001, now + a.bellDecay);
  osc.connect(og).connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + a.bellDecay + 0.1);
}

// ─── Sensor: Aigram bridge (preferred) + DOM fallback (Safari standalone) ──
const sensor = {
  active: false, state: '—',
  smooth: { x: 0, y: 0, z: 0 }, primed: false,
  lastJolt: 0, lastShakeFire: 0,
  domOrient: false, domMotion: false,
  domStatus: 'idle', // 'idle' | 'pending' | 'on' | 'off'
  permState: '—',
};
const SENSOR_SMOOTH = 0.35;
const G_NOM = 9.8;
const TILT_GAIN = G_NOM * Math.SQRT1_2;
const SHAKE_THRESHOLD = 13;

function isEmbedded() {
  const tg = window.Telegram && window.Telegram.WebApp;
  return !!(tg && tg.initData) ||
    new URLSearchParams(location.search).has('api_origin') ||
    (window.parent && window.parent !== window);
}

// Aigram postMessage relay (subscribed even in standalone — harmless when no host)
function setupAigramBridge() {
  if (!window.parent || window.parent === window) return;
  window.addEventListener('message', (ev) => {
    const raw = ev.data;
    if (typeof raw !== 'string') return;
    const PREFIX = 'TG.ACCELEROMETER.CHANGED-';
    if (!raw.startsWith(PREFIX)) return;
    let data;
    try { data = JSON.parse(atob(raw.slice(PREFIX.length))); } catch { return; }
    sensor.active = true;
    sensor.state = 'changed';
    if (!sensor.primed) {
      sensor.smooth.x = data.x; sensor.smooth.y = data.y; sensor.smooth.z = data.z;
      sensor.primed = true;
    } else {
      sensor.smooth.x += (data.x - sensor.smooth.x) * SENSOR_SMOOTH;
      sensor.smooth.y += (data.y - sensor.smooth.y) * SENSOR_SMOOTH;
      sensor.smooth.z += (data.z - sensor.smooth.z) * SENSOR_SMOOTH;
    }
    const gxNorm = Math.max(-1, Math.min(1, sensor.smooth.x / TILT_GAIN));
    const gyNorm = Math.max(-1, Math.min(1, sensor.smooth.y / TILT_GAIN));
    wTarget.x = gxNorm * 1.2;
    wTarget.y = -gyNorm * 1.2;
    const mag = Math.sqrt(data.x * data.x + data.y * data.y + data.z * data.z);
    const jolt = Math.abs(mag - G_NOM);
    sensor.lastJolt = jolt;
    const now = performance.now();
    if (jolt > SHAKE_THRESHOLD && now - sensor.lastShakeFire > 600) {
      sensor.lastShakeFire = now;
      shake(Math.min(1.4, jolt / 14));
    }
  });
  const sub = `TG.ACCELEROMETER-${btoa(JSON.stringify({ refresh_rate: 20 }))}`;
  window.parent.postMessage(sub, '*');
  sensor.state = 'requested';
}
setupAigramBridge();

// DOM DeviceOrientation — driven by gamma/beta, in degrees
window.addEventListener('deviceorientation', (e) => {
  if (sensor.active) return;            // Aigram bridge has authority
  if (e.beta == null && e.gamma == null) return;
  sensor.domOrient = true;
  sensor.domStatus = 'on';
  const gx = Math.max(-1, Math.min(1, (e.gamma || 0) / 45));
  const gy = Math.max(-1, Math.min(1, (e.beta || 0) / 45));
  wTarget.x = gx * 1.2;
  wTarget.y = gy * 1.2;
});
// DOM DeviceMotion — for shake detection
window.addEventListener('devicemotion', (e) => {
  if (sensor.active) return;
  sensor.domMotion = true;
  const accel = e.acceleration && e.acceleration.x !== null ? e.acceleration : null;
  const a = accel || e.accelerationIncludingGravity;
  if (!a) return;
  const ax = a.x || 0, ay = a.y || 0, az = a.z || 0;
  const mag = Math.sqrt(ax * ax + ay * ay + az * az);
  const baseline = accel ? 0 : G_NOM;
  const jolt = Math.abs(mag - baseline);
  sensor.lastJolt = jolt;
  const now = performance.now();
  if (jolt > SHAKE_THRESHOLD && now - sensor.lastShakeFire > 600) {
    sensor.lastShakeFire = now;
    shake(Math.min(1.2, jolt / 14));
  }
});

// iOS 13+ permission prompt — must be triggered in a user gesture, both
// requestPermission() calls fire synchronously (no await between them).
let motionPerms = 'idle';   // 'idle' | 'pending' | 'done'
function requestMotionPerms() {
  if (motionPerms !== 'idle') return;
  const O = window.DeviceOrientationEvent;
  const M = window.DeviceMotionEvent;
  const hasReq = (O && typeof O.requestPermission === 'function') ||
                 (M && typeof M.requestPermission === 'function');
  const toErr = (e) => 'error: ' + (e && e.message ? e.message : e);
  const oP = (O && typeof O.requestPermission === 'function')
    ? O.requestPermission().catch(toErr) : Promise.resolve('n/a');
  const mP = (M && typeof M.requestPermission === 'function')
    ? M.requestPermission().catch(toErr) : Promise.resolve('n/a');
  motionPerms = 'pending';
  sensor.domStatus = 'pending';
  Promise.all([oP, mP]).then(([oS, mS]) => {
    sensor.permState = `o=${oS} m=${mS} req=${hasReq}`;
    motionPerms = 'done';
    setTimeout(() => {
      if (sensor.domOrient || sensor.domMotion) {
        sensor.domStatus = 'on';
      } else {
        sensor.domStatus = 'off';
        motionPerms = 'idle';            // allow retry via the pill
      }
      updatePermPill();
    }, 1500);
  });
}
function updatePermPill() {
  const show = sensor.domStatus === 'off' && !isEmbedded() && !sensor.active;
  permBtn.classList.toggle('is-show', show);
}
// `onclick` (not pointerdown) is the only reliable iOS-Safari gesture for
// requestPermission(). Reasoning in feedback_ios_motion_perms.md.
permBtn.addEventListener('click', () => {
  ensureAudio();
  requestMotionPerms();
});

// ─── Touch fallback: drag-to-shake + tap-sparkle ──────────────────────────
let pointerActive = false;
let pdown = { x: 0, y: 0, t: 0 };
let plast = { x: 0, y: 0, t: 0 };
let dragVel = 0;
function pointerStart(e) {
  ensureAudio();
  // Try perm request opportunistically — works on Android, no-op iOS until pill click
  requestMotionPerms();
  pointerActive = true;
  pdown.x = plast.x = e.clientX;
  pdown.y = plast.y = e.clientY;
  pdown.t = plast.t = performance.now();
  dragVel = 0;
}
function pointerMove(e) {
  if (!pointerActive) return;
  const now = performance.now();
  const dt = Math.max(1, now - plast.t);
  const dx = e.clientX - plast.x;
  const dy = e.clientY - plast.y;
  const v = Math.sqrt(dx * dx + dy * dy) / dt;
  dragVel = dragVel * 0.65 + v * 0.35;
  plast.x = e.clientX; plast.y = e.clientY; plast.t = now;
  if (dragVel > 1.4 && now - sensor.lastShakeFire > 500) {
    sensor.lastShakeFire = now;
    shake(Math.min(1.2, dragVel / 2));
    dragVel = 0;
  }
}
function pointerEnd(e) {
  if (!pointerActive) return;
  pointerActive = false;
  const now = performance.now();
  const moved = Math.hypot(e.clientX - pdown.x, e.clientY - pdown.y);
  const dur = now - pdown.t;
  if (moved < 12 && dur < 280) {
    sparkleAt(e.clientX, e.clientY);
  }
}
canvas.addEventListener('pointerdown', pointerStart);
canvas.addEventListener('pointermove', pointerMove);
canvas.addEventListener('pointerup',   pointerEnd);
canvas.addEventListener('pointercancel', pointerEnd);

function sparkleAt(x, y) {
  const g = globeGeom();
  const dx0 = x - g.cx, dy0 = y - g.cy;
  if (dx0 * dx0 + dy0 * dy0 > g.r * g.r) return;
  const K = 28;
  const idx = [];
  for (let i = 0; i < N; i++) {
    const dx = sx[i] - x;
    const dy = sy[i] - y;
    idx.push({ i, d: dx * dx + dy * dy });
  }
  idx.sort((a, b) => a.d - b.d);
  for (let k = 0; k < K && k < idx.length; k++) {
    const i = idx[k].i;
    const dx = sx[i] - x;
    const dy = sy[i] - y;
    const d = Math.max(0.5, Math.sqrt(dx * dx + dy * dy));
    const force = 6 + Math.random() * 4;
    svx[i] += (dx / d) * force;
    svy[i] += (dy / d) * force;
  }
  energy = Math.min(1, energy + 0.18);
}

// ─── Debug overlay ────────────────────────────────────────────────────────
function drawDebug() {
  const lines = [
    `SNOWGLOBE · ${currentTheme.id}`,
    `dpr: ${DPR.toFixed(2)}  ${W}×${H}`,
    `aigram: ${sensor.state}  active: ${sensor.active ? 'yes' : 'no'}`,
    `dom: status=${sensor.domStatus} orient=${sensor.domOrient ? 'y' : 'n'} motion=${sensor.domMotion ? 'y' : 'n'}`,
    `perm: ${sensor.permState}`,
    `wind: ${wind.x.toFixed(2)} / ${wind.y.toFixed(2)}`,
    `jolt: ${sensor.lastJolt.toFixed(1)}  energy: ${energy.toFixed(2)}`,
  ];
  debugEl.textContent = lines.join('\n');
}

// ─── Main loop ────────────────────────────────────────────────────────────
let last = performance.now();
function frame(now) {
  last = now;
  step();
  render();
  // Refresh perm pill visibility — domStatus can flip after the 1.5s probe
  if (Math.floor(now / 250) % 2 === 0) updatePermPill();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ─── Time / moon / temperature / poetry ───────────────────────────────────
// Poetic fragments — per-theme pools that cycle every ~22 seconds with a
// fade. Kept short (under ~36 chars) so they fit a single line on phone.
const POEMS = {
  winter: [
    'the night begins to taste of snow',
    'all the small lights of memory',
    'moonlight on a black lake',
    'stars sharp enough to cut',
    'every silence is a small church',
    'snow falls on snow',
    'the road home dissolves in breath',
    'winter is the air remembering',
    'a fox crosses the river of frost',
    'stillness, measured by porch lamps',
    'the hour the wolves keep',
    'owls keeping the night legible',
  ],
  sakura: [
    'petals fall like soft applause',
    'even the moon leans in',
    'a paper lantern made of breath',
    'spring is loud only when you stop',
    'we are all temporary',
    'scattered — therefore beautiful',
    'evening, and the river takes its color back',
    'the temple bell does not say goodbye',
    'drifting, an old word for loving',
    'between two pink hours',
    'the dusk wears a kimono',
    'the wind learns the shape of a blossom',
  ],
  cosmos: [
    'all this light arrived very late',
    'we are made of waiting',
    'every star is a verb',
    'gravity is the longest sentence',
    'the dark hums when no one looks',
    'the universe has only one tense',
    'drift is a kind of arrival',
    'the silence between stars',
    'old light, new eyes',
    'we orbit ourselves',
    'even the void has a heartbeat',
    'dust that remembered itself',
  ],
};

// Per-theme temperature pool — picked once per session per theme so the
// reading feels stable while you're inside one mood, but jumps when you
// switch globes. Mix °C / °F so the scale doesn't read as "real weather".
const TEMPS = {
  winter: ['−4°C', '−7°C', '−2°C', '−12°C', '0°C'],
  sakura: ['12°C', '15°C', '11°C', '17°C', '13°C'],
  cosmos: ['−270.4°C', '2.7 K', '−454°F', '−270°C', '3 K'],
};
const themeTempCache = {};
function tempFor(themeId) {
  if (!themeTempCache[themeId]) {
    const pool = TEMPS[themeId];
    themeTempCache[themeId] = pool[Math.floor(Math.random() * pool.length)];
  }
  return themeTempCache[themeId];
}

// Compute moon phase 0..1 (0 = new, 0.5 = full) from a known new moon.
// Reference: 2000-01-06 18:14 UTC. Synodic month ≈ 29.530588853 days.
function moonPhase(date) {
  const ref = Date.UTC(2000, 0, 6, 18, 14);
  const cycle = 29.530588853 * 86400000;
  return ((date.getTime() - ref) % cycle + cycle) % cycle / cycle;
}
function moonGlyph(p) {
  if (p < 0.03 || p > 0.97) return '🌑';
  if (p < 0.22) return '🌒';
  if (p < 0.28) return '🌓';
  if (p < 0.47) return '🌔';
  if (p < 0.53) return '🌕';
  if (p < 0.72) return '🌖';
  if (p < 0.78) return '🌗';
  return '🌘';
}
function moonName(p) {
  if (p < 0.03 || p > 0.97) return 'NEW';
  if (p < 0.22) return 'WAXING';
  if (p < 0.28) return 'FIRST QTR';
  if (p < 0.47) return 'GIBBOUS';
  if (p < 0.53) return 'FULL';
  if (p < 0.72) return 'GIBBOUS';
  if (p < 0.78) return 'LAST QTR';
  return 'WANING';
}
function pad2(n) { return n < 10 ? '0' + n : '' + n; }
function updateStatus() {
  const now = new Date();
  statusTimeEl.textContent = `${pad2(now.getHours())}:${pad2(now.getMinutes())}`;
  const ph = moonPhase(now);
  moonGlyphEl.textContent = moonGlyph(ph);
  moonNameEl.textContent = moonName(ph);
  statusTempEl.textContent = tempFor(currentTheme.id);
}
updateStatus();
// Refresh time every 30 seconds so the clock keeps pace without thrashing
setInterval(updateStatus, 30000);

// Poem rotator — fades the current line out, swaps text, fades in.
let poemIdx = -1;
let poemTimer = null;
const POEM_INTERVAL = 22000;
const POEM_FADE = 1500;
function showPoemLine(text) {
  poemEl.classList.remove('is-visible');
  setTimeout(() => {
    poemEl.textContent = text;
    poemEl.classList.add('is-visible');
  }, POEM_FADE);
}
function nextPoem() {
  const list = POEMS[currentTheme.id];
  let next = Math.floor(Math.random() * list.length);
  if (next === poemIdx) next = (next + 1) % list.length;
  poemIdx = next;
  showPoemLine(list[poemIdx]);
}
function startPoems() {
  if (poemTimer) clearInterval(poemTimer);
  poemIdx = -1;
  // First poem after a beat so the dome reads first
  setTimeout(nextPoem, 1100);
  poemTimer = setInterval(nextPoem, POEM_INTERVAL);
}
function refreshPoemForTheme() {
  if (poemTimer) clearInterval(poemTimer);
  poemIdx = -1;
  // Quick swap (don't wait the full 1.1s) so theme change feels responsive
  showPoemLine('');
  setTimeout(nextPoem, POEM_FADE + 100);
  poemTimer = setInterval(nextPoem, POEM_INTERVAL);
}
startPoems();

// Hook into theme change: refresh status temperature + restart poem cycle
const _origSetTheme = setTheme;
setTheme = function(id) {
  _origSetTheme(id);
  updateStatus();
  refreshPoemForTheme();
};
// Re-bind switcher buttons since they captured the original setTheme
for (const btn of switcherEl.querySelectorAll('.switcher-btn')) {
  // Replace any prior handler — listeners stack in JS, so we'd otherwise
  // call setTheme twice on click after this script section runs.
  const newBtn = btn.cloneNode(true);
  btn.parentNode.replaceChild(newBtn, btn);
  newBtn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    ensureAudio();
    setTheme(newBtn.dataset.theme);
    shake(0.4);
  });
}

// ─── Attract mode: bounded — single welcome shake then idle ───────────────
setTimeout(() => { shake(0.6); }, 380);
</script>
